*, *::before, *::after { box-sizing: border-box; }

/* Glassmorphism — admin dashboard + client-facing pages */

.td-rule::before, .td-rule::after { content: ""; flex: 1; height: 1px; background: var(--line-strong); }

/* Mobile bottom nav safe area */

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

// ── Routing ──────────────────────────────────────────────────────────
function useRoute() {
  const [route, setRoute] = useState(window.location.hash || '#/');
  useEffect(() => {
    const h = () => setRoute(window.location.hash || '#/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const nav = useCallback((to) => { window.location.hash = to; }, []);
  return [route, nav];
}

function useDesktop() {
  const [d, setD] = useState(window.innerWidth >= 768);
  useEffect(() => {
    const h = () => setD(window.innerWidth >= 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return d;
}

// ── Settings (admin-editable, persisted in localStorage) ─────────────
const DEFAULT_SETTINGS = {
  prices: { dropInOff: 300, dropInPeak: 350, peakStartHour: 18, resident: 1500, blockCaptain: 2800, paddleRental: 100, ballSale: 100, coaching: 800 },
  contact: { phone: "+63 (036) 123-4567", email: "hello@thedriveway.club", address: "Old Buswang, Kalibo, Aklan 5600", hours: "Mon–Sun · 6 am to 10 pm", instagram: "", facebook: "https://www.facebook.com/profile.php?id=61582224569423", storyCaption: "🏓 The Driveway — {week}\n\n{open} open slots available 4PM–10PM\n\nBook your court now 👇\nthedriveway.online\n\n#Pickleball #Kalibo #Aklan #TheDriveway #PickleballPhilippines" },
  court: { name: "The Driveway", openHour: 6, closeHour: 22 },
  gcash: { number: "", qrUrl: "", requirePayment: true },
  blockedSlots: {}, // date-specific keys: { "2026-06-30_6:00p": true, ... }
  reminders: "Arrive 15 minutes early\nWear proper court shoes\nBring water and sunscreen\nRespect other players' time",
  manualApproval: false,
};

// "6:00p" → 18, "7:00a" → 7
function parseSlotHour(time) {
  const m = time.match(/^(\d+)(?::(\d+))?([ap])m?$/);
  if (!m) return 0;
  let hr = parseInt(m[1], 10);
  if (m[3] === 'p' && hr !== 12) hr += 12;
  if (m[3] === 'a' && hr === 12) hr = 0;
  return hr;
}
function formatTime(time) {
  if (!time) return '';
  return time.replace(/([ap])$/, '$1m');
}
function formatTimeRange(startTime, duration = 1) {
  if (duration <= 1) return formatTime(startTime);
  const startIdx = SLOT_TIMES.indexOf(startTime);
  if (startIdx === -1) return formatTime(startTime);
  const endIdx = startIdx + duration;
  const endTime = SLOT_TIMES[endIdx] || SLOT_TIMES[SLOT_TIMES.length - 1];
  return `${formatTime(startTime)} – ${formatTime(endTime)}`;
}
function isPeakSlot(settings, time) {
  return parseSlotHour(time) >= (settings.prices.peakStartHour ?? 18);
}
function rateForSlot(settings, time) {
  return isPeakSlot(settings, time) ? settings.prices.dropInPeak : settings.prices.dropInOff;
}
const SLOT_TIMES = ["6:00a","7:00a","8:00a","9:00a","10:00a","11:00a","12:00p","1:00p","2:00p","3:00p","4:00p","5:00p","6:00p","7:00p","8:00p","9:00p"];
const WEEK_DAY_NAMES = ["MON","TUE","WED","THU","FRI","SAT","SUN"];

const getCourtToday = () => {
  const d = new Date();
  const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
  return new Date(utc + (3600000 * 8)); // court is in GMT+8 (Asia/Manila)
};

// YYYY-MM-DD for a Date object (used to match bookings to a specific calendar day)
const courtYmd = (dObj) =>
  `${dObj.getFullYear()}-${String(dObj.getMonth() + 1).padStart(2, '0')}-${String(dObj.getDate()).padStart(2, '0')}`;

// YYYY-MM-DD of a booking's start, normalised to court time (GMT+8)
const bookingCourtYmd = (b) => {
  if (!b.startDate) return null;
  const d = new Date(b.startDate);
  const local = new Date(d.getTime() + d.getTimezoneOffset() * 60000 + 3600000 * 8);
  return courtYmd(local);
};

function getWeekDays(offset = 0) {
  const base = getCourtToday();
  base.setDate(base.getDate() + offset * 7);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    return [WEEK_DAY_NAMES[(d.getDay() + 6) % 7], d.getDate(), d];
  });
}

function getSlotDate(dateNum, offset = 0) {
  const base = getCourtToday();
  base.setDate(base.getDate() + offset * 7);
  for (let i = 0; i < 7; i++) {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    if (d.getDate() === dateNum) return d;
  }
  return base;
}

function formatGoogleCalendarDate(date) {
  return date.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
}

function buildCalendarUrl(booking) {
  if (!booking.startDate || !booking.endDate) return null;
  const start = formatGoogleCalendarDate(new Date(booking.startDate));
  const end = formatGoogleCalendarDate(new Date(booking.endDate));
  const text = encodeURIComponent(`Pickleball at The Driveway · ${booking.id}`);
  const details = encodeURIComponent(`Booking: ${booking.id}\nName: ${booking.name}\nPhone: ${booking.phone}`);
  const location = encodeURIComponent('The Driveway, Old Buswang, Kalibo, Aklan');
  return `https://www.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${start}/${end}&details=${details}&location=${location}`;
}

function formatWeekRange(offset = 0) {
  const base = getCourtToday();
  base.setDate(base.getDate() + offset * 7);
  const end = new Date(base);
  end.setDate(base.getDate() + 6);
  const opts = { month: 'short', day: 'numeric' };
  return `${base.toLocaleDateString('en-US', opts)} — ${end.toLocaleDateString('en-US', opts)}`;
}

function isSlotInPast(dayLabel, dateNum, time, offset = 0) {
  const d = getSlotDate(dateNum, offset);
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate(), parseSlotHour(time), 0, 0, 0);
  return target < new Date();
}

// Booking row <-> JS shape converters (DB uses snake_case)
const fromRow = (r) => r && ({
  id: r.id, createdAt: r.created_at, status: r.status,
  name: r.name, phone: r.phone, email: r.email,
  players: r.players, skill: r.skill,
  paddleQty: r.paddle_qty || 0, ballQty: r.ball_qty || 0,
  gcashReceipt: r.gcash_receipt || null,
  paymentStatus: r.payment_status || 'pending',
  day: r.day, dayLabel: r.day_label, date: r.date, time: r.time,
  court: r.court, needsRental: r.needs_rental, needsCoach: r.needs_coach,
  notes: r.notes || '', duration: r.duration || 1, coachId: r.coach_id || null,
  reminderSent: r.reminder_sent || false, reviewSent: r.review_sent || false,
  totalPaid: r.total_paid || null,
  paymentMethod: r.payment_method || null,
  startDate: r.start_date || null,
  endDate: r.end_date || null,
});
const toRow = (b) => ({
  id: b.id, status: b.status,
  name: b.name, phone: b.phone, email: b.email || null,
  players: b.players, skill: b.skill,
  paddle_qty: b.paddleQty || 0, ball_qty: b.ballQty || 0,
  gcash_receipt: b.gcashReceipt || null,
  payment_status: b.paymentStatus || 'pending',
  day: b.day, day_label: b.dayLabel, date: b.date, time: b.time,
  court: b.court, needs_rental: !!b.needsRental, needs_coach: !!b.needsCoach,
  notes: b.notes || '', duration: b.duration || 1,
  coach_id: b.coachId || null,
  start_date: b.startDate || null, end_date: b.endDate || null,
  total_paid: b.totalPaid || null,
  payment_method: b.paymentMethod || null,
});
const fromSettingsRow = (r) => r && ({
  prices: { ...DEFAULT_SETTINGS.prices, ...(r.prices || {}) },
  contact: { ...DEFAULT_SETTINGS.contact, ...Object.fromEntries(Object.entries(r.contact || {}).filter(([, v]) => v !== '' && v != null)) },
  court: { ...DEFAULT_SETTINGS.court, ...(r.court || {}) },
  gcash: { ...DEFAULT_SETTINGS.gcash, ...(r.gcash || {}) }, blockedSlots: r.blocked_slots || {},
  reminders: r.reminders || DEFAULT_SETTINGS.reminders,
  manualApproval: r.manual_approval ?? false,
});

function useSettings() {
  const [s, setS] = useState(DEFAULT_SETTINGS);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    if (!window.sb) { setLoaded(true); return; }
    let alive = true;
    sb.from('settings').select('prices, contact, court, gcash, blocked_slots, reminders, manual_approval').eq('id', 1).single().then(({ data }) => {
      if (alive && data) { const merged = { ...DEFAULT_SETTINGS, ...fromSettingsRow(data) }; setS(merged); setLoaded(true); }
      else if (alive) setLoaded(true);
    });
    const ch = sb.channel('settings-rt')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, (p) => {
        if (p.new) { const merged = { ...DEFAULT_SETTINGS, ...fromSettingsRow(p.new) }; setS(merged); }
      })
      .subscribe();
    return () => { alive = false; sb.removeChannel(ch); };
  }, []);

  // Admin-only update (requires password). Pass current `pw` from session.
  const update = async (next, pw) => {
    setS(next); // optimistic
    const { error } = await sb.rpc('admin_update_settings', {
      pw, new_prices: next.prices, new_contact: next.contact,
      new_court: next.court, new_gcash: next.gcash || {}, new_reminders: next.reminders || '', new_blocked: next.blockedSlots || {},
      new_manual_approval: next.manualApproval ?? false,
    });
    if (error) { alert("Failed to save: " + error.message); throw error; }
  };
  const reset = (pw) => update(DEFAULT_SETTINGS, pw);
  return { settings: s, settingsLoaded: loaded, update, reset };
}

function useBookings() {
  const [b, setB] = useState([]);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    if (!window.sb) { setLoaded(true); return; }
    let alive = true;
    sb.from('bookings').select('*').order('created_at', { ascending: false }).then(({ data }) => {
      if (alive) { setB((data || []).map(fromRow)); setLoaded(true); }
    });
    const ch = sb.channel('bookings-rt')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bookings' }, (p) => {
        setB(prev => prev.find(x => x.id === p.new.id) ? prev : [fromRow(p.new), ...prev]);
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'bookings' }, (p) => {
        setB(prev => prev.filter(x => x.id !== p.old.id));
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bookings' }, (p) => {
        setB(prev => prev.map(x => x.id === p.new.id ? fromRow(p.new) : x));
      })
      .subscribe();
    return () => { alive = false; sb.removeChannel(ch); };
  }, []);

  const add = async (booking) => {
    const id = "DW-" + Math.random().toString(36).slice(2, 7).toUpperCase();
    const row = toRow({ id, status: 'confirmed', ...booking });
    const { error } = await sb.from('bookings').insert(row);
    if (error) { alert("Failed to book: " + error.message); throw error; }
    return id;
  };

  // Admin-only deletion (requires password)
  const remove = async (id, pw) => {

  };

  // Admin confirms GCash payment
  const confirmPayment = async (id) => {
    const { data: booking, error: fetchErr } = await sb.from('bookings').select('*').eq('id', id).single();

    const { error } = await sb.from('bookings').update({ payment_status: 'paid' }).eq('id', id);
    if (error) { alert("Failed to confirm payment: " + error.message); throw error; }

    if (booking.email) {
      try {
        const courtRate = rateForSlot(settings, booking.time);
        const isPeak = isPeakSlot(settings, booking.time);
        const url = `${window.SUPABASE_URL}/functions/v1/send-booking-email`;
        await fetch(url, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            type: 'payment_confirmed',
            to: booking.email,
            booking: {
              id: booking.id,
              name: booking.name,
              dayLabel: booking.day_label,
              time: booking.time,
              court: booking.court,
              phone: booking.phone,
              paymentStatus: 'paid',
              courtRate,
              isPeak,
              paddleQty: booking.paddle_qty || 0,
              paddlePrice: settings.prices.paddleRental,
              ballQty: booking.ball_qty || 0,
              ballPrice: settings.prices.ballSale,
              startDate: booking.start_date,
              endDate: booking.end_date,
            },
          }),
        });
      } catch (e) { console.error('Payment confirmation email failed:', e.message); }
    }
  };

  // Guest cancellation via RPC (phone verified server-side, bypasses RLS)
  const guestRemove = async (id, phone) => {
    const { error } = await sb.rpc('guest_cancel_booking', { booking_id: id, phone });
    if (error) { alert("Failed to cancel: " + error.message); throw error; }
  };

  const updatePaymentStatus = async (id, status) => {
    const { error } = await sb.from('bookings').update({ payment_status: status }).eq('id', id);
    if (error) { alert("Failed to update payment status: " + error.message); throw error; }
  };

  // Admin approves a pending (off-hours) booking → confirmed
  const approveBooking = async (id) => {
    const { error } = await sb.from('bookings').update({ status: 'confirmed' }).eq('id', id);
    if (error) { alert("Failed to approve: " + error.message); throw error; }
  };

  // Admin marks a confirmed booking as completed with actual payment amount
  const markCompleted = async (id, pw, amount, paymentMethod) => {
    const { error } = await sb.rpc('admin_mark_completed', { pw, booking_id: id, amount, p_method: paymentMethod });
    if (error) { alert("Failed to mark completed: " + error.message); throw error; }
  };

  return { bookings: b, bookingsLoaded: loaded, add, remove, guestRemove, confirmPayment, approveBooking, markCompleted, updatePaymentStatus };
}

function useAuth() {

  useEffect(() => {

const AppCtx = React.createContext(null);
const useApp = () => React.useContext(AppCtx);

const slotKey = (day, time, dateObj = null) => {
  if (dateObj && dateObj instanceof Date) {
    const y = dateObj.getFullYear();
    const m = String(dateObj.getMonth() + 1).padStart(2, '0');
    const d = String(dateObj.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}_${time}`;
  }
  return `${day}_${time}`;
};
const slotIndex = (time) => SLOT_TIMES.indexOf(time);
const isSlotInBookingRange = (booking, day, time, date = null) => {
  if (date !== null && booking.date !== date) return false;
  if (booking.day !== day) return false;
  const startIdx = slotIndex(booking.time);
  const checkIdx = slotIndex(time);
  if (startIdx === -1 || checkIdx === -1) return false;
  const duration = booking.duration || 1;
  return checkIdx >= startIdx && checkIdx < startIdx + duration;
};
const isSlotBlocked = (settings, bookings, day, time, dateObj = null) => {
  if (settings.blockedSlots[slotKey(day, time, dateObj)]) return 'blocked';
  const dateNum = dateObj ? (dateObj instanceof Date ? dateObj.getDate() : dateObj) : null;
  if (bookings.some(b => (b.status === 'confirmed' || b.status === 'completed') && isSlotInBookingRange(b, day, time, dateNum))) return 'booked';
  return 'open';
};

                `;
                // Render the styled receipt to an image so backgrounds always
                // appear in the PDF (browsers drop bg colors when "Background

                const iframe = document.createElement('iframe');
                iframe.style.cssText = 'position:fixed;left:-99999px;top:0;width:480px;height:1300px;border:0;';
                document.body.appendChild(iframe);
                const idoc = iframe.contentWindow.document;
                idoc.open(); idoc.write(receiptHTML); idoc.close();
                // Load html2canvas INSIDE the iframe so it renders in the same
                // document (cross-document capture returns blank).
                await new Promise((resolve) => {
                  const s = idoc.createElement('script');
                  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                  s.onload = resolve; s.onerror = resolve;
                  (idoc.body || idoc.documentElement).appendChild(s);
                });
                try { await idoc.fonts.ready; } catch (e) {}
                await new Promise(r => setTimeout(r, 250));
                let dataUrl = '';

                  const h2c = iframe.contentWindow.html2canvas;

                document.body.removeChild(iframe);
                const w = window.open('', '_blank');

                } else {

                }

          <button className="td-btn td-btn-primary" style={{ width: "100%", marginTop: 16 }} onClick={onClose}>

          </button>
        </div>
      </Modal>
    );
  }

  return (

        </div>

        <div style={{ background: "#f0f8fd", padding: 12, borderRadius: 4, fontSize: 12.5, color: "var(--muted)", marginBottom: 18, border: "1px solid #bde3f7" }}>
          <strong style={{ color: "var(--ink)" }}>No account needed.</strong> Just give us a way to reach you.
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div>
            <label className="td-label">Full name *</label>
            <input className="td-input" value={form.name} onChange={(e) => update('name', e.target.value)} placeholder="Juan Dela Cruz" required/>
          </div>

          </div>
          <div>

// ── Email helpers ────────────────────────────────────────────────────
async function sendBookingEmail(booking) {
  if (!booking.email) return;
  const url = `${window.SUPABASE_URL}/functions/v1/send-booking-email`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      to: booking.email,
      subject: 'Your Driveway booking is confirmed',
      booking: {
        id: booking.id,
        name: booking.name,
        phone: booking.phone,
        email: booking.email,
        dayLabel: booking.dayLabel,
        time: booking.time,
        court: booking.court,
        startDate: booking.startDate,
        endDate: booking.endDate,
        courtRate: booking.courtRate,
        isPeak: booking.isPeak,
        paddleQty: booking.paddleQty || 0,
        paddlePrice: booking.paddlePrice,
        ballQty: booking.ballQty || 0,
        ballPrice: booking.ballPrice,
        paymentStatus: booking.paymentStatus,
      },
    }),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    console.error('Guest email failed:', data.error || await res.text());
  } else {
    console.log('Guest email sent, messageId:', data.messageId);
  }
}

async function sendAdminNotification(booking) {
  const url = `${window.SUPABASE_URL}/functions/v1/send-booking-email`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      type: 'admin',
      booking: {
        id: booking.id,
        name: booking.name,
        phone: booking.phone,
        email: booking.email || '',
        dayLabel: booking.dayLabel,
        time: booking.time,
        court: booking.court,
        paddleQty: booking.paddleQty || 0,
        paddlePrice: booking.paddlePrice,
        ballQty: booking.ballQty || 0,
        ballPrice: booking.ballPrice,
        courtRate: booking.courtRate,
        isPeak: booking.isPeak,
        paymentStatus: booking.paymentStatus,
        startDate: booking.startDate,
        endDate: booking.endDate,
      },
    }),
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
}

// ── Lookup / Cancel booking ──────────────────────────────────────────
const LookupBookingModal = ({ onClose }) => {
  const { guestRemove } = useApp();
  const [code, setCode] = useState("");
  const [phone, setPhone] = useState("");
  const [results, setResults] = useState([]);
  const [selected, setSelected] = useState(null);
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const [searchAttempts, setSearchAttempts] = useState(0);
  const [searchBlocked, setSearchBlocked] = useState(false);
  const [cancelled, setCancelled] = useState(false);

  const search = async () => {
    setErr(""); setResults([]); setSelected(null);
    if (!phone.trim()) { setErr("Enter your phone number."); return; }
    if (searchBlocked) { setErr("Too many attempts. Please wait 60 seconds."); return; }
    if (searchAttempts >= 5) {
      setSearchBlocked(true);
      setErr("Too many attempts. Please wait 60 seconds.");
      setTimeout(() => { setSearchBlocked(false); setSearchAttempts(0); }, 60000);
      return;
    }
    setBusy(true);
    setSearchAttempts(a => a + 1);
    try {
      if (code.trim()) {
        // Code + phone: find specific booking
        const { data, error } = await sb.from('bookings').select('*').eq('id', code.trim()).single();
        if (error || !data) { setErr("Booking not found."); return; }
        if (data.phone !== phone.trim()) { setErr("Phone number does not match."); return; }
        setResults([fromRow(data)]);
      } else {
        // Phone only: find all bookings for this phone
        const { data, error } = await sb.from('bookings').select('*').eq('phone', phone.trim()).eq('status', 'confirmed').order('created_at', { ascending: false });
        if (error) { setErr("Failed to search."); return; }
        if (!data || data.length === 0) { setErr("No bookings found for this phone number."); return; }
        setResults(data.map(fromRow));
      }
    } finally { setBusy(false); }
  };

  const cancel = async () => {
    const b = selected || results[0];
    if (!b) return;
    if (!confirm(`Cancel booking ${b.id}?`)) return;
    setBusy(true);
    try {
      await guestRemove(b.id, phone);
      setResults([]); setSelected(null);
      setCode(""); setPhone("");
      setCancelled(true);
      setTimeout(() => { setCancelled(false); onClose(); }, 2000);
    } catch (e) {
      // error already alerted in guestRemove
    } finally { setBusy(false); }
  };

  return (
    <Modal onClose={onClose} maxWidth={460}>
      <TDStripe height={4}/>
      <div style={{ padding: "24px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
          <div>
            <h2 className="td-display" style={{ fontSize: 26, margin: "0 0 4px" }}>
              {results.length === 0 ? "Find my booking" : (selected || results.length === 1) ? "Your booking" : "Your bookings"}
            </h2>
            <p style={{ color: "var(--muted)", fontSize: 13, margin: 0 }}>
              {results.length === 0 ? "Enter your phone number — confirmation code is optional." : (selected || results.length === 1) ? "Review your reservation below, or cancel it." : "Select a booking to view or cancel."}
            </p>
          </div>
          <button onClick={onClose} style={{ background: "transparent", border: "none", fontSize: 22, cursor: "pointer", color: "var(--muted)", padding: 0, lineHeight: 1 }}>×</button>
        </div>

        {cancelled && (
          <div style={{ padding: "12px 14px", background: "rgba(47,107,83,0.1)", border: "1px solid var(--court)", borderRadius: 6, color: "var(--court)", fontSize: 14, fontWeight: 600, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
            <span>✓</span> Booking cancelled successfully.
          </div>
        )}
        {err && <div style={{ color: "var(--rust)", fontSize: 13, marginBottom: 12 }}>{err}</div>}

        {results.length === 0 ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div>
              <label className="td-label">Phone number <span style={{ color: "var(--rust)" }}>*</span></label>
              <input className="td-input" value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="09XX XXX XXXX"/>
            </div>
            <div>
              <label className="td-label">Confirmation code <span style={{ color: "var(--muted)", fontWeight: 400 }}>(optional)</span></label>
              <input className="td-input" value={code} onChange={(e) => setCode(e.target.value)} placeholder="DW-ABC12" style={{ fontFamily: "var(--mono)" }}/>
            </div>
            <button className="td-btn td-btn-primary" disabled={busy} style={{ width: "100%", marginTop: 4, opacity: busy ? 0.6 : 1 }} onClick={search}>
              {busy ? "Searching…" : "Find booking"}
            </button>
          </div>
        ) : selected || results.length === 1 ? (
          <div>
            {(selected ? [selected] : results).map(b => (

              </button>
              <button className="td-btn td-btn-ghost" style={{ flex: 1 }} onClick={() => { setResults([]); setSelected(null); setErr(""); }}>

              </button>
            </div>
          </div>
        ) : (
          <div>
            <p style={{ fontSize: 13, color: "var(--muted)", margin: "0 0 12px" }}>We found {results.length} bookings for this phone. Select one:</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: 320, overflowY: "auto" }}>
              {results.map(b => (
                <button key={b.id} onClick={() => setSelected(b)} style={{ textAlign: "left", background: "#e0f2fe", border: "1px solid var(--line)", borderRadius: 6, padding: 14, cursor: "pointer" }}>
                  <div style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--muted)" }}>{b.id}</div>
                  <div style={{ fontWeight: 600, fontSize: 15, marginTop: 2 }}>{b.dayLabel} · {formatTime(b.time)}</div>
                  <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 2 }}>{b.name}</div>
                </button>
              ))}
            </div>
            <button className="td-btn td-btn-ghost" style={{ width: "100%", marginTop: 12 }} onClick={() => { setResults([]); setErr(""); }}>
              Search again
            </button>
          </div>
        )}
      </div>
    </Modal>
  );
};

const AdminPage = ({ nav, isDesktop }) => {
  const { settings, update: updateSettings, reset, bookings, add: addBooking, remove: removeBooking, events, addEvent, removeEvent, logout, adminPw, approveBooking, markCompleted, waitlist, removeWaitlist, notifyWaitlist, coaches, addCoach, updateCoach, removeCoach, reviews, approveReview, removeReview, updatePaymentStatus } = useApp();
  const [tab, setTab] = useState('overview');
  const [draft, setDraft] = useState(settings);
  const [saveMsg, setSaveMsg] = useState("");
  const saveSettings = async () => {
    try { await updateSettings(draft, adminPw); setSaveMsg("Saved successfully"); setTimeout(() => setSaveMsg(""), 2500); }
    catch (e) { /* updateSettings already alerts on error */ }
  };
  const [slotPopup, setSlotPopup] = useState(null);
  const [slotPopupConfirm, setSlotPopupConfirm] = useState(null); // 'cancel' | null — inline confirm for mobile
  const [slotChooser, setSlotChooser] = useState(null); // {day, time} when an open grid slot is clicked
  const [createSlot, setCreateSlot] = useState(null); // {day, time} prefill (or {}) for the new-booking modal
  const [coachPhoto, setCoachPhoto] = useState(''); // uploaded photo_url for the new-coach form
  const [slotsWeekOffset, setSlotsWeekOffset] = useState(0);
  const [anScope, setAnScope] = useState('week'); // analytics scope: 'week' | 'month' | 'all'
  const [anWeekOffset, setAnWeekOffset] = useState(0); // heatmap week navigation
  const [bookingSubTab, setBookingSubTab] = useState('confirmed');
  const [searchQuery, setSearchQuery] = useState('');
  const [paymentFilter, setPaymentFilter] = useState('all');
  const [sortOrder, setSortOrder] = useState('newest');
  const [storyDay, setStoryDay] = useState(null);
  const [completeModal, setCompleteModal] = useState(null); // {booking} when marking a booking as completed

  // sync draft on tab switch (for the pricing/info forms)
  useEffect(() => { setDraft(settings); }, [tab, settings]);

  const getBookingTotal = (b) => {
    const startHour = parseSlotHour(b.time);
    const dur = b.duration || 1;
    const courtTotal = Array.from({ length: dur }, (_, i) => {
      const h = startHour + i;
      const fakeTime = SLOT_TIMES.find(t => parseSlotHour(t) === h) || `${h}:00p`;
      return rateForSlot(settings, fakeTime);
    }).reduce((s, r) => s + r, 0);
    const paddleCost = (b.paddleQty || 0) * settings.prices.paddleRental;
    const ballCost = (b.ballQty || 0) * settings.prices.ballSale;
    const coach = b.needsCoach && b.coachId ? coaches.find(c => c.id === b.coachId) : null;
    const coachCost = b.needsCoach ? (coach ? coach.rate : settings.prices.coaching) : 0;
    return courtTotal + paddleCost + ballCost + coachCost;
  };

  const pendingBookings = [...bookings]
    .filter(b => b.status === 'pending')
    .sort((a, b) => (a.createdAt ? new Date(a.createdAt) : 0) - (b.createdAt ? new Date(b.createdAt) : 0));
  const confirmedBookings = [...bookings]
    .filter(b => b.status === 'confirmed')
    .filter(b => {
      const q = searchQuery.toLowerCase().trim();
      const matchesSearch = !q ||
        b.name.toLowerCase().includes(q) ||
        b.phone.includes(q) ||
        b.id.toLowerCase().includes(q);
      const matchesPayment = paymentFilter === 'all' || b.paymentStatus === paymentFilter;
      return matchesSearch && matchesPayment;
    })
    .sort((a, b) => {
      const ta = a.createdAt ? new Date(a.createdAt) : 0;
      const tb = b.createdAt ? new Date(b.createdAt) : 0;
      if (sortOrder === 'newest') return tb - ta;
      return ta - tb;
    });
  const completedBookings = [...bookings]
    .filter(b => b.status === 'completed')
    .filter(b => {
      const q = searchQuery.toLowerCase().trim();
      const matchesSearch = !q ||
        b.name.toLowerCase().includes(q) ||
        b.phone.includes(q) ||
        b.id.toLowerCase().includes(q);
      return matchesSearch;
    })
    .sort((a, b) => {
      const ta = a.createdAt ? new Date(a.createdAt) : 0;
      const tb = b.createdAt ? new Date(b.createdAt) : 0;
      if (sortOrder === 'newest') return tb - ta;
      return ta - tb;
    });
  const cancelledBookings = [...bookings]
    .filter(b => b.status === 'cancelled')
    .filter(b => {
      const q = searchQuery.toLowerCase().trim();
      const matchesSearch = !q ||
        b.name.toLowerCase().includes(q) ||
        b.phone.includes(q) ||
        b.id.toLowerCase().includes(q);
      return matchesSearch;
    })
    .sort((a, b) => {
      const ta = a.createdAt ? new Date(a.createdAt) : 0;
      const tb = b.createdAt ? new Date(b.createdAt) : 0;
      return tb - ta;
    });

  const activeBookings = [...confirmedBookings, ...completedBookings];
  const filteredBookings = confirmedBookings; // alias for confirmed tab list

  const paidRevenue = completedBookings.reduce((s, b) => s + (b.totalPaid || 0), 0);
  const pendingRevenue = confirmedBookings.reduce((s, b) => s + getBookingTotal(b), 0);

    .filter(b => b.status === 'confirmed')

    const rows = activeBookings.map(b => {
      const courtRate = isPeakSlot(settings, b.time) ? settings.prices.dropInPeak : settings.prices.dropInOff;

      const coachCost = b.needsCoach ? (coach ? coach.rate : settings.prices.coaching) : 0;
      const total = (courtRate * (b.duration || 1)) + paddleCost + ballCost + coachCost;
      return [b.id, b.dayLabel || b.day, b.time, b.duration || 1, b.name, b.phone, b.email || '', b.skill || '', b.paddleQty || 0, b.ballQty || 0, b.needsCoach ? 'Yes' : 'No', coach ? coach.name : '', courtRate, paddleCost, ballCost, coachCost, total, b.paymentStatus, b.totalPaid || '', b.paymentMethod || '', b.gcashReceipt || ''];

    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');

// ── Admin: create a booking (walk-in / phone) ────────────────────────
const AdminBookingModal = ({ prefill, settings, bookings, weekOffset, onCreate, onClose }) => {
  const weekDays = getWeekDays(weekOffset); // [[name, dateNum], ...]
  const [name, setName] = useState('');
  const [phone, setPhone] = useState('');
  const [day, setDay] = useState(prefill.day || weekDays[0][0]);
  const [time, setTime] = useState(prefill.time || SLOT_TIMES[0]);
  const [paymentStatus, setPaymentStatus] = useState('pending');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    if (!name.trim() || !phone.trim()) { setErr('Name and phone are required.'); return; }
    const entry = weekDays.find(([n]) => n === day);
    if (!entry) { setErr('Pick a valid day.'); return; }
    const dateNum = entry[1];
    if (isSlotInPast(day, dateNum, time, weekOffset)) { setErr('That slot is in the past.'); return; }
    const slotDate = getSlotDate(dateNum, weekOffset);
    const dayBookings = bookings.filter(b => bookingCourtYmd(b) === courtYmd(slotDate));
    if (isSlotBlocked(settings, dayBookings, day, time, slotDate) !== 'open') { setErr('That slot is already booked or blocked.'); return; }
    setErr('');
    setBusy(true);
    try {
      const hour = parseSlotHour(time);
      const start = new Date(slotDate); start.setHours(hour, 0, 0, 0);
      const end = new Date(start); end.setHours(hour + 1, 0, 0, 0);
      await onCreate({
        name: name.trim(), phone: phone.trim(), players: 1, duration: 1,
        day, dayLabel: `${day} ${dateNum}`, date: dateNum, time,
        court: settings.court.name, paymentStatus,
        startDate: start.toISOString(), endDate: end.toISOString(),
      });
      onClose();
    } catch (e) { setBusy(false); } // add() already alerts on error
  };

  const fld = { width: "100%", marginBottom: 12 };
  return (
    <Modal onClose={onClose} maxWidth={420}>
      <div style={{ padding: 24 }}>
        <h3 className="td-display" style={{ fontSize: 24, margin: "0 0 4px" }}>New booking</h3>
        <div style={{ fontSize: 13, color: "var(--muted)", marginBottom: 20 }}>Walk-in or phone reservation · mark as completed later</div>
        <input className="td-input" style={fld} placeholder="Name" value={name} onChange={(e) => setName(e.target.value)} autoFocus/>
        <input className="td-input" style={fld} placeholder="Phone" value={phone} onChange={(e) => setPhone(e.target.value)}/>
        <select className="td-input" style={{ ...fld, cursor: "pointer" }} value={paymentStatus} onChange={(e) => setPaymentStatus(e.target.value)}>
          <option value="pending">Payment: Pending</option>
          <option value="paid">Payment: Paid</option>
        </select>
        <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
          <select className="td-input" style={{ flex: 1, cursor: "pointer" }} value={day} onChange={(e) => setDay(e.target.value)}>
            {weekDays.map(([n, dn]) => <option key={n} value={n}>{n} {dn}</option>)}
          </select>
          <select className="td-input" style={{ flex: 1, cursor: "pointer" }} value={time} onChange={(e) => setTime(e.target.value)}>
            {SLOT_TIMES.map(t => <option key={t} value={t}>{formatTime(t)}</option>)}
          </select>
        </div>
        {err && <div style={{ color: "var(--rust)", fontSize: 13, marginBottom: 12 }}>{err}</div>}
        <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
          <button onClick={submit} disabled={busy} className="td-btn td-btn-primary" style={{ flex: 1, padding: "12px 16px", fontSize: 13, opacity: busy ? 0.6 : 1 }}>
            {busy ? 'Saving…' : 'Create booking'}
          </button>
          <button onClick={onClose} className="td-btn" style={{ padding: "12px 16px", fontSize: 13, background: "transparent", color: "var(--muted)", border: "1px solid var(--line)" }}>
            Cancel
          </button>
        </div>
      </div>
    </Modal>
  );
};

// ── Court diagram ────────────────────────────────────────────────────
// Portrait orientation: 20ft × 44ft → svg 50 × 100. Net horizontal across short axis.
const TDCourt = ({ width = 180, height = 360, ball, players }) => {
  const W = 50, H = 100;
  const cL = 5, cR = W - 5, cT = 5, cB = H - 5;
  const netY = H / 2;
  const kH = 14.3; // kitchen depth: 7/44 × 90
  const kT = netY - kH, kB = netY + kH;
  const line = "#ffffff", lw = 0.45;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width={width} height={height}
         preserveAspectRatio="xMidYMid meet"
         style={{ display: "block", borderRadius: 4, background: "#cdd1d4" }}>
      <defs>
        <pattern id="td-court-dots" width="3" height="3" patternUnits="userSpaceOnUse">
          <circle cx="1.5" cy="1.5" r="0.32" fill="rgba(0,0,0,0.10)"/>
        </pattern>
        <pattern id="td-net" x="0" y="0" width="1.4" height="1.4" patternUnits="userSpaceOnUse">
          <path d="M0 0 L1.4 1.4 M1.4 0 L0 1.4" stroke="#0e1a2e" strokeWidth="0.15"/>
        </pattern>
      </defs>

      {/* light-gray surround */}
      <rect x="0" y="0" width={W} height={H} fill="#cdd1d4"/>
      <rect x="0" y="0" width={W} height={H} fill="url(#td-court-dots)"/>

      {/* blue service areas */}
      <rect x={cL} y={cT} width={cR - cL} height={kT - cT} fill="#2a6cab"/>
      <rect x={cL} y={kB} width={cR - cL} height={cB - kB} fill="#2a6cab"/>
      {/* mid-gray kitchen (NVZ) */}
      <rect x={cL} y={kT} width={cR - cL} height={kB - kT} fill="#8b9197"/>

      {/* white court lines */}
      <rect x={cL} y={cT} width={cR - cL} height={cB - cT} fill="none" stroke={line} strokeWidth={lw}/>
      <line x1={cL} y1={kT} x2={cR} y2={kT} stroke={line} strokeWidth={lw}/>
      <line x1={cL} y1={kB} x2={cR} y2={kB} stroke={line} strokeWidth={lw}/>
      {/* centerline — only outside kitchen */}
      <line x1={W/2} y1={cT} x2={W/2} y2={kT} stroke={line} strokeWidth={lw}/>
      <line x1={W/2} y1={kB} x2={W/2} y2={cB} stroke={line} strokeWidth={lw}/>

      {/* net */}
      <g>
        <line x1={cL - 2} y1={netY} x2={cR + 2} y2={netY} stroke="#0e1a2e" strokeWidth="0.45"/>
        <rect x={cL - 2} y={netY - 0.9} width={cR - cL + 4} height="1.8" fill="url(#td-net)" opacity="0.9"/>
        <circle cx={cL - 2} cy={netY} r="0.8" fill="#0e1a2e"/>
        <circle cx={cR + 2} cy={netY} r="0.8" fill="#0e1a2e"/>
      </g>

      {ball !== false && (
        <circle cx={ball?.x ?? 32} cy={ball?.y ?? 40} r="1.3" fill="#a3e635" stroke="#0e1a2e" strokeWidth="0.25"/>
      )}
      {(players || []).map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r="2.1" fill={p.color || "#f4b933"} stroke="#0e1a2e" strokeWidth="0.35"/>
      ))}
    </svg>
  );
};

  const { settings, events, openLookup, reviews, coaches } = useApp();
  const approvedReviews = reviews.filter(r => r.approved);
  const activeCoaches = (coaches || []).filter(c => c.active);
  const [cName, setCName] = React.useState('');
  const [cEmail, setCEmail] = React.useState('');
  const [cMessage, setCMessage] = React.useState('');
  const [cStatus, setCStatus] = React.useState('');
  const [cBusy, setCBusy] = React.useState(false);

  const sendContact = async (e) => {
    e.preventDefault();
    if (!cName.trim() || !cEmail.trim() || !cMessage.trim()) {
      setCStatus('Please fill in all fields.');
      return;
    }
    setCBusy(true);
    setCStatus('');
    try {
      const url = `${window.SUPABASE_URL}/functions/v1/send-booking-email`;
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          type: 'contact',
          contact: { name: cName.trim(), email: cEmail.trim(), message: cMessage.trim() },
        }),
      });
      if (!res.ok) throw new Error('Failed to send');
      setCStatus('Message sent! We will get back to you soon.');
      setCName(''); setCEmail(''); setCMessage('');
    } catch (err) {
      setCStatus('Something went wrong. Please try again or email us directly at the.driveway2026@gmail.com');

              })}
            </ul>
          </div>
        ))}
      </div>
      <div style={{ paddingTop: 20, borderTop: "1px solid rgba(244,234,208,0.15)", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, fontSize: 12, color: "rgba(244,234,208,0.55)" }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          <span>© 2026 The Driveway Pickleball · Kalibo, Aklan</span>
          <span style={{ fontSize: 10, color: "rgba(244,234,208,0.35)", letterSpacing: "0.02em" }}>
            Built by <a href="https://www.facebook.com/Sirjeey/" target="_blank" rel="noopener" style={{ color: "rgba(244,234,208,0.35)", textDecoration: "underline" }}>Sergei Tabanar</a>
          </span>
        </div>
        <span style={{ fontFamily: "var(--display)", letterSpacing: "0.18em" }}>★ KALIBO · AKLAN ★</span>
        <span style={{ display: "flex", gap: 14, alignItems: "center" }}>
          {settings.contact.instagram && <a href="http://www.thedriveway.online/{settings.contact.instagram}" target="_blank" rel="noopener" style={{ color: "rgba(244,234,208,0.55)", textDecoration: "none" }}>Instagram</a>}
          {settings.contact.facebook && <a href="http://www.thedriveway.online/{settings.contact.facebook}" target="_blank" rel="noopener" style={{ color: "rgba(244,234,208,0.55)", textDecoration: "none" }}>Facebook</a>}
          <a href="https://maps.app.goo.gl/6pnoVZNjXqsZVi3t5" target="_blank" rel="noopener" style={{ color: "rgba(244,234,208,0.55)", textDecoration: "none" }}>📍 Directions</a>
          <a href="index.html#/admin/login" style={{ color: "rgba(244,234,208,0.4)", textDecoration: "none", fontFamily: "var(--display)", letterSpacing: "0.12em", fontSize: 11 }}>STAFF</a>
        </span>

    </div>

  );
};

// ═══════════════════════════════════════════════════════════════════
// STORY SHARE — Instagram / Facebook stories
// ═══════════════════════════════════════════════════════════════════
const StoryShareModal = ({ bookings, settings, onClose }) => {
  const canvasRef = React.useRef(null);
  const [storyBlob, setStoryBlob] = React.useState(null);
  const [copied, setCopied] = React.useState(false);
  const [weekOffset, setWeekOffset] = React.useState(0);
  const [ratio, setRatio] = React.useState('9:16'); // '9:16' story · '3:4' post

  const SLOTS = ["4:00p","5:00p","6:00p","7:00p","8:00p","9:00p"];
  const DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Week starts on the current day (today → today + 6).
  const getWeekDays = (offset) => {
    const base = getCourtToday(); base.setDate(base.getDate() + offset * 7);
    return Array.from({length: 7}, (_, i) => {
      const d = new Date(base); d.setDate(base.getDate() + i);
      return [DAY_NAMES[d.getDay()], d.getDate(), d.getMonth(), d];
    });
  };

  const weekDays = getWeekDays(weekOffset);
  const weekDateStrs = new Set(weekDays.map(([, , , dateObj]) => courtYmd(dateObj)));
  const weekBookings = bookings.filter(b => { const s = bookingCourtYmd(b); return s && weekDateStrs.has(s); });
  const totalSlots = weekDays.length * SLOTS.length;
  const bookedCount = weekDays.reduce((acc, [dayName, , , dateObj]) =>
    acc + SLOTS.filter(t => isSlotBlocked(settings, weekBookings, dayName, t, dateObj) !== 'open').length, 0);
  const openCount = totalSlots - bookedCount;

  const [fd, fm] = [weekDays[0][1], weekDays[0][2]];
  const [ld, lm] = [weekDays[6][1], weekDays[6][2]];
  const weekLabel = `${weekDays[0][0]} ${fd} ${MONTHS[fm]} – ${weekDays[6][0]} ${ld} ${MONTHS[lm]}`;
  const captionTemplate = settings?.contact?.storyCaption || DEFAULT_SETTINGS.contact.storyCaption;
  const caption = captionTemplate.replace(/\{week\}/g, weekLabel).replace(/\{open\}/g, openCount);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = 1080, H = ratio === '3:4' ? 1440 : 1920;
    canvas.width = W; canvas.height = H;

    const LIGHT_BLUE = '#c5e8f5';
    const NAVY = '#0e1a2e';
    const WHITE = '#ffffff';
    const GOLD = '#f4b933';

    const DISPLAY = "900 {SZ}px 'Big Shoulders Display', 'Arial Black', sans-serif";
    const MONO = "500 {SZ}px 'DM Mono', ui-monospace, monospace";
    const f = (tpl, sz) => tpl.replace('{SZ}', sz);

    const roundRect = (x, y, w, h, r) => {
      ctx.beginPath();
      ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
      ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
      ctx.closePath();
    };

    const logoImg = new Image();
    logoImg.src = 'assets/logo.jpg';
    Promise.all([
      document.fonts.load("900 1px 'Big Shoulders Display'"),
      document.fonts.load("500 1px 'DM Mono'"),
      new Promise(res => { logoImg.onload = res; logoImg.onerror = res; }),
    ]).then(draw).catch(draw);

    function draw() {
      const base = getCourtToday(); base.setDate(base.getDate() + weekOffset * 7);
      const todayDays = Array.from({length: 7}, (_, i) => {
        const d = new Date(base); d.setDate(base.getDate() + i);
        return [['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()], d.getDate(), d.getMonth(), d];
      });
      const drawWeekStrs = new Set(todayDays.map(([, , , dO]) => courtYmd(dO)));
      const drawWeekBookings = bookings.filter(b => { const s = bookingCourtYmd(b); return s && drawWeekStrs.has(s); });

      // Background — soft glass gradient + color blobs
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, '#eaf4fc');
      bgGrad.addColorStop(0.5, '#dfeefb');
      bgGrad.addColorStop(1, '#e6f3ec');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);
      const blob = (cx, cy, r, color) => {
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        g.addColorStop(0, color); g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      };
      blob(W * 0.18, H * 0.13, Math.max(W, H) * 0.34, 'rgba(33,150,243,0.30)');
      blob(W * 0.84, H * 0.52, Math.max(W, H) * 0.36, 'rgba(47,107,83,0.22)');
      blob(W * 0.34, H * 0.90, Math.max(W, H) * 0.34, 'rgba(244,185,51,0.20)');

      const GUTTER = 48;
      const gridW = W - GUTTER * 2; // 984

      // HEADER — logo circle + title
      let y = 60;
      const LOGO_R = 72;
      ctx.save();
      ctx.beginPath(); ctx.arc(W/2, y + LOGO_R, LOGO_R, 0, Math.PI*2); ctx.clip();
      if (logoImg.complete && logoImg.naturalWidth) {
        ctx.drawImage(logoImg, W/2 - LOGO_R, y, LOGO_R*2, LOGO_R*2);
      } else {
        ctx.fillStyle = NAVY; ctx.fill();
      }
      ctx.restore();
      y += LOGO_R * 2 + 24;

      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = NAVY;
      ctx.font = f(DISPLAY, 90);
      ctx.fillText('THE DRIVEWAY', W/2, y);
      y += 100;

      ctx.fillStyle = 'rgba(14,26,46,0.65)';
      ctx.font = f(MONO, 26);
      ctx.fillText('OLD BUSWANG, KALIBO, AKLAN', W/2, y);
      y += 52;

      const MONTHS_ARR = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const [,fd,fm] = todayDays[0], [,ld,lm] = todayDays[6];
      const weekLabel = `${todayDays[0][0]} ${fd} ${MONTHS_ARR[fm]} – ${todayDays[6][0]} ${ld} ${MONTHS_ARR[lm]}`;
      ctx.fillStyle = 'rgba(14,26,46,0.92)';
      ctx.font = f(DISPLAY, 44);
      ctx.fillText(weekLabel, W/2, y);
      y += 70;

      // Divider
      ctx.fillStyle = 'rgba(14,26,46,0.20)';
      ctx.fillRect(GUTTER, y, gridW, 2);
      y += 24;

      // GRID — days as columns, times as rows. CTA is bottom-anchored and
      // rows fill the remaining space, so the layout adapts to any height.
      const TIME_COL = 100;   // left label column width
      const colW = (gridW - TIME_COL) / todayDays.length; // ~126px per day
      const HEADER_H = 90;
      const GAP = 6;
      const bottomReserve = ratio === '9:16' ? 210 : 36;   // link-sticker space only for the story
      const CTA_H = 172;
      const ctaGap = 40;
      const legendH = 60;
      const legendGap = 22;

      const gridTop = y;
      const headerRowBottom = gridTop + HEADER_H + GAP;
      const ctaY = H - bottomReserve - CTA_H;
      const rowsBottom = ctaY - ctaGap - legendH - legendGap;
      const ROW_H = Math.max(26, Math.floor((rowsBottom - headerRowBottom - SLOTS.length * GAP) / SLOTS.length));

      // Frosted glass panel framing the grid + legend
      const panelTop = gridTop - 18;
      const panelBottom = ctaY - ctaGap + 2;
      ctx.save();
      ctx.shadowColor = 'rgba(33,150,243,0.20)'; ctx.shadowBlur = 48; ctx.shadowOffsetY = 18;
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      roundRect(GUTTER - 14, panelTop, gridW + 28, panelBottom - panelTop, 30); ctx.fill();
      ctx.restore();
      ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 2.5;
      roundRect(GUTTER - 14, panelTop, gridW + 28, panelBottom - panelTop, 30); ctx.stroke();

      // Day header row
      const realToday = new Date();
      todayDays.forEach(([dayName, dateNum, monIdx], ci) => {
        const cx = GUTTER + TIME_COL + ci * colW + colW / 2;
        const isToday = weekOffset === 0 && dateNum === realToday.getDate() && monIdx === realToday.getMonth();
        ctx.fillStyle = isToday ? NAVY : 'rgba(255,255,255,0.78)';
        roundRect(cx - colW/2 + 3, gridTop, colW - 6, HEADER_H, 8); ctx.fill();
        if (!isToday) { ctx.strokeStyle = 'rgba(14,26,46,0.16)'; ctx.lineWidth = 1.5; roundRect(cx - colW/2 + 3, gridTop, colW - 6, HEADER_H, 8); ctx.stroke(); }
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = isToday ? WHITE : NAVY;
        ctx.font = f(DISPLAY, 28);
        ctx.fillText(dayName, cx, gridTop + HEADER_H/2 - 16);
        ctx.font = f(DISPLAY, 34);
        ctx.fillStyle = isToday ? 'rgba(255,255,255,0.9)' : 'rgba(14,26,46,0.7)';
        ctx.fillText(String(dateNum), cx, gridTop + HEADER_H/2 + 20);
      });

      // Time rows
      const labels = ['4PM','5PM','6PM','7PM','8PM','9PM'];
      SLOTS.forEach((time, ri) => {
        const rowY = headerRowBottom + ri * (ROW_H + GAP);

        // Time label
        ctx.fillStyle = 'rgba(255,255,255,0.62)';
        roundRect(GUTTER, rowY, TIME_COL - 6, ROW_H, 8); ctx.fill();
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(14,26,46,0.78)';
        ctx.font = f(MONO, 28);
        ctx.fillText(labels[ri] || '', GUTTER + (TIME_COL - 6)/2, rowY + ROW_H/2);

        // Day cells
        todayDays.forEach(([dayName, dateNum, , dateObj], ci) => {
          const cx = GUTTER + TIME_COL + ci * colW;
          const blockedState = isSlotBlocked(settings, drawWeekBookings, dayName, time, dateObj);

          if (blockedState !== 'open') {
            ctx.fillStyle = 'rgba(222,82,82,0.95)';
            roundRect(cx + 3, rowY, colW - 6, ROW_H, 8); ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5;
            roundRect(cx + 3, rowY, colW - 6, ROW_H, 8); ctx.stroke();
          } else {
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            roundRect(cx + 3, rowY, colW - 6, ROW_H, 8); ctx.fill();
            ctx.strokeStyle = 'rgba(14,26,46,0.14)'; ctx.lineWidth = 1.5;
            roundRect(cx + 3, rowY, colW - 6, ROW_H, 8); ctx.stroke();
          }
        });
      });

      // Legend (between grid and CTA, inside the panel)
      const legY = rowsBottom + legendGap + legendH / 2;
      ctx.textBaseline = 'middle'; ctx.font = f(MONO, 38);
      [['rgba(222,82,82,0.95)', 'Booked', 0], ['rgba(255,255,255,0.85)', 'Open', 300]].forEach(([bg, label, ox]) => {
        ctx.fillStyle = bg;
        roundRect(GUTTER + 6 + ox, legY - 20, 40, 40, 6); ctx.fill();
        ctx.strokeStyle = 'rgba(14,26,46,0.18)'; ctx.lineWidth = 2; roundRect(GUTTER + 6 + ox, legY - 20, 40, 40, 6); ctx.stroke();
        ctx.fillStyle = NAVY; ctx.textAlign = 'left';
        ctx.fillText(label, GUTTER + 6 + ox + 54, legY);
      });

      // CTA — translucent dark glass (bottom-anchored)
      ctx.save();
      ctx.shadowColor = 'rgba(14,26,46,0.30)'; ctx.shadowBlur = 36; ctx.shadowOffsetY = 14;
      ctx.fillStyle = 'rgba(14,26,46,0.97)';
      roundRect(GUTTER, ctaY, gridW, CTA_H, 24); ctx.fill();
      ctx.restore();
      ctx.strokeStyle = 'rgba(125,211,248,0.4)'; ctx.lineWidth = 2;
      roundRect(GUTTER, ctaY, gridW, CTA_H, 24); ctx.stroke();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = WHITE;
      ctx.font = f(DISPLAY, 48);
      ctx.fillText('BOOK NOW', W/2, ctaY + CTA_H/2);

      canvas.toBlob(blob => setStoryBlob(blob), 'image/png');
    }
  }, [bookings, weekOffset, ratio]);

  const canShare = typeof navigator !== 'undefined' && navigator.canShare && navigator.canShare({ files: [new File([''], 'test.png', { type: 'image/png' })] });

  const shareToStory = async () => {
    if (!storyBlob) return;
    const file = new File([storyBlob], 'thedriveway-week.png', { type: 'image/png' });
    if (canShare) {
      try { await navigator.share({ files: [file], title: 'The Driveway — This Week' }); }
      catch (err) { if (err.name !== 'AbortError') alert('Share failed: ' + err.message); }
    } else {
      const url = URL.createObjectURL(storyBlob);
      const a = document.createElement('a'); a.href = url; a.download = file.name; a.click();
      URL.revokeObjectURL(url);
    }
  };

  const copyCaption = async () => {
    try { await navigator.clipboard.writeText(caption); setCopied(true); setTimeout(() => setCopied(false), 2000); }
    catch (e) {}
  };

  return (
    <div onClick={onClose} className="glass-ui" style={{
      position: "fixed", inset: 0, background: "rgba(11,20,36,0.55)",
      backdropFilter: "blur(24px) saturate(140%)", WebkitBackdropFilter: "blur(24px) saturate(140%)", zIndex: 2000,
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "20px",
    }}>
      <canvas ref={canvasRef} style={{ width: "auto", height: "68vh", maxWidth: "94vw", borderRadius: 8, boxShadow: "0 20px 60px rgba(0,0,0,0.5)" }}/>
      <div onClick={(e) => e.stopPropagation()} style={{ marginTop: 12, display: "flex", gap: 8, width: "100%", maxWidth: 380 }}>
        {[['9:16', 'Story 9:16'], ['3:4', 'Post 3:4']].map(([r, label]) => (
          <button key={r} onClick={() => setRatio(r)} style={{
            flex: 1, padding: "9px 0", fontSize: 12, fontFamily: "var(--display)", fontWeight: 700,
            letterSpacing: "0.08em", textTransform: "uppercase", cursor: "pointer", borderRadius: 10,
            background: ratio === r ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.14)",
            color: ratio === r ? "var(--ink)" : "#fff",
            border: ratio === r ? "1px solid rgba(255,255,255,0.9)" : "1px solid rgba(255,255,255,0.35)",
            backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)",
          }}>{label}</button>
        ))}
      </div>
      <div onClick={(e) => e.stopPropagation()} style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 8, width: "100%", maxWidth: 380 }}>
        <button onClick={() => setWeekOffset(w => w - 1)} disabled={weekOffset === 0} style={{ background: weekOffset === 0 ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.2)", color: "#fff", border: "none", borderRadius: 6, width: 36, height: 36, fontSize: 18, cursor: weekOffset === 0 ? "default" : "pointer", opacity: weekOffset === 0 ? 0.35 : 1 }}>‹</button>
        <div style={{ flex: 1, textAlign: "center", color: "#fff", fontSize: 12, fontFamily: "var(--mono)", letterSpacing: "0.05em", opacity: 0.8 }}>{weekLabel}</div>
        <button onClick={() => setWeekOffset(w => w + 1)} style={{ background: "rgba(255,255,255,0.2)", color: "#fff", border: "none", borderRadius: 6, width: 36, height: 36, fontSize: 18, cursor: "pointer" }}>›</button>
      </div>

const WaitlistModal = ({ slot, onClose }) => {
  const { addWaitlist } = useApp();
  const [form, setForm] = useState({ name: '', phone: '', email: '' });
  const [busy, setBusy] = useState(false);
  const [success, setSuccess] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    if (!form.name.trim() || !form.phone.trim() || busy) return;
    setBusy(true);
    try {
      await addWaitlist({ ...form, day: slot.day, dayLabel: slot.dayLabel, date: slot.date, time: slot.time, court: slot.court });
      setSuccess(true);
      setTimeout(onClose, 2000);
    } finally { setBusy(false); }
  };
  return (
    <Modal onClose={onClose} maxWidth={400}>
      <TDStripe height={4}/>
      <div style={{ padding: 24 }}>
        <h2 className="td-display" style={{ fontSize: 26, margin: "0 0 4px" }}>Join waitlist</h2>
        <p style={{ color: "var(--muted)", fontSize: 13, margin: "0 0 16px" }}>{slot.dayLabel} · {formatTime(slot.time)} is full. Leave your details and we'll notify you if it opens.</p>
        {success && (
          <div style={{ padding: "12px 14px", background: "rgba(47,107,83,0.1)", border: "1px solid var(--court)", borderRadius: 6, color: "var(--court)", fontSize: 14, fontWeight: 600, marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
            <span>✓</span> You're on the waitlist! We'll text you if the slot opens up.
          </div>
        )}
        <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div>
            <label className="td-label">Full name *</label>
            <input className="td-input" value={form.name} onChange={(e) => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Juan Dela Cruz" required/>
          </div>
          <div>
            <label className="td-label">Mobile number *</label>
            <input className="td-input" value={form.phone} onChange={(e) => setForm(f => ({ ...f, phone: e.target.value }))} placeholder="09XX XXX XXXX" required/>
          </div>
          <div>

            <input className="td-input" type="email" value={form.email} onChange={(e) => setForm(f => ({ ...f, email: e.target.value }))} placeholder="you@email.com"/>

  );
};

const BookingsPage = ({ nav, isDesktop }) => {
  const { settings, bookings, openBooking, openLookup } = useApp();
  // Rolling 7-day view starting today, no Saturday-to-Friday fixed range
  const [activeDay, setActiveDay] = useState(0);
  const [waitlistSlot, setWaitlistSlot] = useState(null);
  const [storyDay, setStoryDay] = useState(null);

  // Timezone-invariant helpers: force court's GMT+8 timezone for all calculations
  const getCourtToday = () => {
    const d = new Date();
    const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
    return new Date(utc + (3600000 * 8)); // court is in GMT+8
  };

  const days = Array.from({ length: 7 }, (_, i) => {
    const d = getCourtToday();
    d.setUTCDate(d.getUTCDate() + i);
    const dayName = WEEK_DAY_NAMES[(d.getUTCDay() + 6) % 7];
    const dateNum = d.getUTCDate();
    const dateObj = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), 0, 0, 0, 0));
    return [dayName, dateNum, dateObj];
  });
  
  const slots = SLOT_TIMES.filter(t => parseSlotHour(t) >= 16); // 4pm onwards only

  const getSlotUTC = (dateObj, timeStr) => {
    const hour = parseSlotHour(timeStr);
    const pad = (n) => String(n).padStart(2, '0');
    const dateStr = dateObj.toISOString().split('T')[0]; // "YYYY-MM-DD"
    return new Date(`${dateStr}T${pad(hour)}:00:00+08:00`);
  };

  const formatMoving7DaysRange = () => {
    const today = getCourtToday();
    const end = new Date(today);
    end.setUTCDate(today.getUTCDate() + 6);
    const opts = { month: 'short', day: 'numeric', timeZone: 'UTC' };
    return `${today.toLocaleDateString('en-US', opts)} — ${end.toLocaleDateString('en-US', opts)}`;
  };

  const isSlotInPastLocal = (dateObj, timeStr) => {
    const slotUTC = getSlotUTC(dateObj, timeStr);
    return slotUTC.getTime() < new Date().getTime();
  };

  const isSlotInBookingDateRange = (booking, slotDateObj, timeStr) => {
    if (!booking.startDate || !booking.endDate) return false;
    const bStart = new Date(booking.startDate).getTime();
    const bEnd = new Date(booking.endDate).getTime();
    
    const sTime = getSlotUTC(slotDateObj, timeStr).getTime();
    return sTime >= bStart && sTime < bEnd;
  };

  const isSlotBlockedLocal = (settings, bookings, dayLabel, timeStr, dateObj) => {
    // Build the court calendar date from dateObj's UTC fields so the block key
    // matches the date-specific keys the admin writes (slotKey reads local fields).
    const courtDate = new Date(dateObj.getUTCFullYear(), dateObj.getUTCMonth(), dateObj.getUTCDate());
    if (settings.blockedSlots[slotKey(dayLabel, timeStr, courtDate)]) return 'blocked';

    // Check if any confirmed booking covers this slot's time
    const booked = bookings.some(b => b.status === 'confirmed' && isSlotInBookingDateRange(b, dateObj, timeStr));
    if (booked) return 'booked';

    return 'open';
  };

  const slotState = (dLabel, t, dateObj) => {
    if (isSlotInPastLocal(dateObj, t)) return 'past';
    return isSlotBlockedLocal(settings, bookings, dLabel, t, dateObj);
  };

  const slotStyle = (state) => {
    if (state === 'past') return { bg: "#f0f4f8", c: "#b0bec5", label: "—" };
    if (state === 'blocked') return { bg: "#f0f4f8", c: "#b0bec5", label: "—" };
    if (state === 'booked') return { bg: "#dbeafe", c: "var(--muted)", label: "BOOKED" };
    return { bg: "white", c: "var(--ink)", label: "OPEN" };
  };

  const handleSlotClick = (dayLabel, dateNum, dateObj, time, state) => {
    if (state === 'booked') {
      setWaitlistSlot({ day: dayLabel, dayLabel: `${dayLabel} ${dateNum}`, date: dateNum, time, court: settings.court.name });
      return;
    }
    if (state !== 'open') return;
    if (isSlotInPastLocal(dateObj, time)) return;
    const start = getSlotUTC(dateObj, time);
    const end = new Date(start.getTime() + 3600000); // 1 hour duration
    openBooking({ day: dayLabel, dayLabel: `${dayLabel} ${dateNum}`, date: dateNum, time, dayKey: dayLabel, startDate: start.toISOString(), endDate: end.toISOString() });
  };

  // Off-hours (before 4pm) direct booking — same form as clicking a slot.
  const offHoursSection = () => (
    <div className="td-card" style={{ padding: isDesktop ? 20 : 16 }}>
      <div className="td-display" style={{ fontSize: isDesktop ? 20 : 17 }}>Need a morning or afternoon slot?</div>

        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Message us on Facebook
      </a>
    </div>
  );

  // Public top bar (no auth nav — guest-friendly)
  const TopBar = () => (
    <nav style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: isDesktop ? "16px 24px" : "12px 16px", borderBottom: "1px solid var(--line)", background: "rgba(238,246,252,0.72)", backdropFilter: "blur(14px) saturate(160%)", WebkitBackdropFilter: "blur(14px) saturate(160%)", position: "sticky", top: 0, zIndex: 90 }}>

          <span className="td-chip td-chip" style={{ background: "#2196f3", color: "white" }}>Peak (6pm onwards) · ₱{settings.prices.dropInPeak}/hr</span>
          <span className="td-chip" style={{ background: "#fef3c7", color: "#92400e", border: "1px solid #fde68a", display: "inline-flex", alignItems: "center", gap: 6 }}>
            <span>📅</span>
            <span>Bookings are open for the next 7 days ({formatMoving7DaysRange()}).</span>
          </span>
        </div>

        <div style={{ padding: "10px 32px 32px" }}>
          <div className="td-card" style={{ padding: 0, overflow: "hidden" }}>
            <div style={{ display: "flex", padding: "14px 18px", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid var(--line)", flexWrap: "wrap", gap: 12 }}>
              <div className="td-display" style={{ fontSize: 16 }}>{settings.court.name}</div>
              <div style={{ display: "flex", gap: 12, fontSize: 11, fontFamily: "var(--display)", letterSpacing: "0.12em", textTransform: "uppercase", color: "var(--muted)" }}>
                {[["Open","white"],["Booked","#dbeafe"],["Past","#dbeafe"]].map(([l,c]) => (
                  <span key={l} style={{ display: "inline-flex", alignItems: "center", gap: 5 }}>
                    <span style={{ width: 12, height: 12, background: c, borderRadius: 2, border: "1px solid var(--line)" }}/>{l}
                  </span>
                ))}
              </div>
            </div>
            <div style={{ overflowX: "auto" }}>
              <div style={{ display: "grid", gridTemplateColumns: "70px repeat(7, 1fr)", gap: 1, background: "var(--line)", minWidth: 700 }}>
                <div style={{ background: "white" }}/>
                {days.map(([d, n, dateObj], i) => (
                  <div key={i} onClick={() => setActiveDay(i)} style={{ background: activeDay === i ? "var(--ink)" : "white", color: activeDay === i ? "var(--paper)" : "var(--ink)", padding: "10px 0", textAlign: "center", cursor: "pointer" }}>
                    <div style={{ fontFamily: "var(--display)", fontSize: 10.5, letterSpacing: "0.14em", color: activeDay === i ? "#7dd3f8" : "var(--muted)" }}>{d}</div>
                    <div className="td-display" style={{ fontSize: 20, marginTop: 2 }}>{n}</div>
                  </div>
                ))}
                {slots.map((t) => (
                  <React.Fragment key={t}>
                    <div style={{ background: "white", padding: "9px 8px", fontSize: 11, color: "var(--muted)", fontFamily: "var(--mono)", textAlign: "right" }}>{t}</div>
                    {days.map(([d, n, dateObj]) => {
                      const state = slotState(d, t, dateObj);
                      const s = slotStyle(state);
                      return (
                        <button key={d+t} onClick={() => handleSlotClick(d, n, dateObj, t, state)} style={{
                          background: s.bg, color: s.c, padding: "10px 6px", fontFamily: "var(--display)", fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", border: "none",
                          cursor: state === 'open' || state === 'booked' ? "pointer" : "default", minHeight: 38,
                        }}>{s.label}</button>
                      );
                    })}
                  </React.Fragment>
                ))}
              </div>
            </div>
          </div>

          <div style={{ marginTop: 18, fontSize: 13, color: "var(--muted)", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <span>Click any open slot to reserve. Booked slots: click to join waitlist. Past hours are blocked automatically. <button onClick={() => openLookup()} style={{ background: "transparent", border: "none", color: "var(--ink)", textDecoration: "underline", cursor: "pointer", fontSize: "inherit", padding: 0 }}>Find or cancel my booking →</button></span>
          </div>

          <div style={{ marginTop: 16 }}>{offHoursSection()}</div>
        </div>
        {waitlistSlot && <WaitlistModal slot={waitlistSlot} onClose={() => setWaitlistSlot(null)}/>}
      </div>
    );
  }

  // Mobile single-court bookings
  return (
    <div className="glass-ui" style={{ background: "linear-gradient(180deg, #eef6fc 0%, #e4f0fb 45%, #e7f3ec 100%)", backgroundAttachment: "fixed", minHeight: "100dvh" }}>
      <TopBar/>
      <div style={{ padding: "16px 20px 6px" }}>
        <div className="td-eyebrow" style={{ fontSize: 10 }}>Book a slot · No account needed</div>
        <div className="td-display" style={{ fontSize: 28, marginTop: 4 }}>Pick your hour.</div>
        <div style={{ fontSize: 13, color: "var(--muted)", marginTop: 6 }}>{formatMoving7DaysRange()} · {settings.court.name}</div>
      </div>

      <div style={{ padding: "8px 14px 0", display: "flex", gap: 5 }}>
        {days.map(([d, n, dateObj], i) => (
          <button key={i} onClick={() => setActiveDay(i)} style={{ flex: 1, padding: "8px 0", borderRadius: 4, background: activeDay === i ? "var(--ink)" : "transparent", color: activeDay === i ? "var(--paper)" : "var(--ink)", border: activeDay === i ? "none" : "1px solid var(--line)", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center" }}>
            <span style={{ fontFamily: "var(--display)", fontSize: 9, letterSpacing: "0.12em", color: activeDay === i ? "#2196f3" : "var(--muted)" }}>{d}</span>
            <span className="td-display" style={{ fontSize: 16 }}>{n}</span>
          </button>
        ))}
      </div>

      <div style={{ padding: "10px 14px", display: "flex", justifyContent: "center", alignItems: "center", gap: 6 }}>
        <span className="td-eyebrow" style={{ fontSize: 11, padding: "0 8px" }}>{formatMoving7DaysRange()}</span>
        <button className="td-btn" style={{ padding: "6px 12px", fontSize: 11, background: "var(--ink)", color: "var(--paper)", borderRadius: 4 }} onClick={() => openLookup()}>My bookings</button>
      </div>

      <div style={{ padding: "12px 20px 6px", display: "flex", flexDirection: "column", gap: 8 }}>
        <div style={{ display: "flex", gap: 8, fontSize: 11 }}>
          <span className="td-chip" style={{ background: "#e0f2fe", color: "#0369a1" }}>Off-peak ₱{settings.prices.dropInOff}/hr</span>
          <span className="td-chip" style={{ background: "#2196f3", color: "white" }}>6pm+ ₱{settings.prices.dropInPeak}/hr</span>
        </div>
        <div className="td-chip" style={{ background: "#fef3c7", color: "#92400e", border: "1px solid #fde68a", fontSize: 11.5, padding: "6px 10px", borderRadius: 4, display: "flex", alignItems: "center", gap: 6, lineHeight: 1.3 }}>
          <span>📅</span>
          <span>Bookings are only open for the next 7 days ({formatMoving7DaysRange()}).</span>
        </div>
      </div>

        <div style={{ padding: "10px 20px 30px" }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {slots.map((t) => {
            const [dLabel, dNum, dateObj] = days[activeDay];
            const state = slotState(dLabel, t, dateObj);
            const s = slotStyle(state);
            return (
              <button key={t} onClick={() => handleSlotClick(dLabel, dNum, dateObj, t, state)} style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                padding: "12px 14px", border: "1px solid var(--line)", borderRadius: 4,
                background: s.bg, color: s.c, cursor: state === 'open' || state === 'booked' ? "pointer" : "default",
                fontFamily: "var(--display)", fontSize: 13, letterSpacing: "0.06em",
              }}>
                <span style={{ fontFamily: "var(--mono)", fontSize: 13, letterSpacing: 0 }}>{t}</span>
                <span style={{ fontWeight: 700 }}>{s.label}</span>
              </button>
            );
          })}
        </div>
        <div style={{ padding: "14px 0 0", display: "flex", flexDirection: "column", gap: 12, alignItems: "center" }}>
          {offHoursSection()}
          <div style={{ fontSize: 13, color: "var(--muted)", textAlign: "center" }}>
            Already booked? <button onClick={() => openLookup()} style={{ background: "transparent", border: "none", color: "var(--ink)", textDecoration: "underline", cursor: "pointer", fontSize: "inherit", padding: 0 }}>Find or cancel my booking →</button>
          </div>
        </div>
      </div>
      {waitlistSlot && <WaitlistModal slot={waitlistSlot} onClose={() => setWaitlistSlot(null)}/>}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [route, nav] = useRoute();
  const isDesktop = useDesktop();
  const settingsApi = useSettings();
  const bookingsApi = useBookings();
  const eventsApi = useEvents();
  const coachesApi = useCoaches();
  const waitlistApi = useWaitlist();
  const reviewsApi = useReviews();
  const authApi = useAuth();
  const adminApi = useAdmin();
  const [bookingSlot, setBookingSlot] = useState(null);
  const [lookupOpen, setLookupOpen] = useState(false);

  const openBooking = (slot) => setBookingSlot(slot);
  const closeBooking = () => setBookingSlot(null);
  const openLookup = () => setLookupOpen(true);

  const promoteWaitlist = async (day, time) => {
    if (!window.sb) return;
    try {
      const { data: matches } = await sb.from('waitlist').select('*').eq('day', day).eq('time', time).order('created_at', { ascending: true }).limit(1);
      if (!matches?.length) return;
      const w = matches[0];
      const newId = 'DW-' + Math.random().toString(36).slice(2, 7).toUpperCase();
      const { error: bookErr } = await sb.from('bookings').insert({
        id: newId, status: 'confirmed',
        name: w.name, phone: w.phone, email: w.email || null,
        day: w.day, day_label: w.day_label, date: w.date,
        time: w.time, court: w.court, players: w.players || 4,
        skill: null, paddle_qty: 0, ball_qty: 0,
        payment_status: 'pending', needs_rental: false, needs_coach: false, duration: 1,
      });
      if (bookErr) { console.error('Waitlist promotion failed:', bookErr); return; }
      await sb.from('waitlist').delete().eq('id', w.id);
      if (w.email) {
        try {
          const s = settingsApi.settings;
          await fetch(`${window.SUPABASE_URL}/functions/v1/send-booking-email`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${window.SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              type: 'waitlist_promoted',
              to: w.email,
              booking: {
                id: newId, name: w.name, dayLabel: w.day_label,
                time: w.time, court: w.court, phone: w.phone,
                paymentStatus: 'pending',
                courtRate: rateForSlot(s, w.time), isPeak: isPeakSlot(s, w.time),
                paddleQty: 0, paddlePrice: s.prices.paddleRental,
                ballQty: 0, ballPrice: s.prices.ballSale,
              },
            }),
          });
        } catch (e) { console.error('Waitlist promotion email failed:', e); }
      }
    } catch (e) { console.error('Waitlist promotion failed:', e); }
  };

  // Resolve a booking's slot from local state first; only hit the network
  // (with maybeSingle to avoid a 406 on 0 rows) if it isn't loaded.
  const lookupSlot = async (id) => {
    const local = bookingsApi.bookings.find(b => b.id === id);
    if (local) return { day: local.day, time: local.time };
    const { data } = await sb.from('bookings').select('day, time').eq('id', id).maybeSingle();
    return data || null;
  };
  const removeWithPromotion = async (id, pw) => {
    const bk = await lookupSlot(id);
    await bookingsApi.remove(id, pw);
    if (bk) promoteWaitlist(bk.day, bk.time);
  };
  const guestRemoveWithPromotion = async (id, phone) => {
    const bk = await lookupSlot(id);
    await bookingsApi.guestRemove(id, phone);
    if (bk) promoteWaitlist(bk.day, bk.time);
  };

  const ctx = {
    settings: settingsApi.settings, update: settingsApi.update, reset: settingsApi.reset,
    bookings: bookingsApi.bookings, add: bookingsApi.add, remove: removeWithPromotion, guestRemove: guestRemoveWithPromotion, confirmPayment: bookingsApi.confirmPayment, approveBooking: bookingsApi.approveBooking, markCompleted: bookingsApi.markCompleted, updatePaymentStatus: bookingsApi.updatePaymentStatus,
    events: eventsApi.events, addEvent: eventsApi.add, removeEvent: eventsApi.remove,
    coaches: coachesApi.coaches, addCoach: coachesApi.add, updateCoach: coachesApi.update, removeCoach: coachesApi.remove,
    waitlist: waitlistApi.waitlist, addWaitlist: waitlistApi.addWaitlist, removeWaitlist: waitlistApi.removeWaitlist, notifyWaitlist: waitlistApi.notifyWaitlist,
    reviews: reviewsApi.reviews, addReview: reviewsApi.addReview, approveReview: reviewsApi.approveReview, removeReview: reviewsApi.removeReview,
    user: authApi.user, authLoading: authApi.authLoading, signUp: authApi.signUp, signIn: authApi.signIn, signOut: authApi.signOut,
    isAdmin: adminApi.isAdmin, adminPw: adminApi.adminPw, login: adminApi.login, logout: adminApi.logout,
    openBooking, closeBooking, openLookup,
  };

  if (!window.sb) {
    return (
      <div className="glass-ui" style={{ minHeight: "100dvh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, background: "linear-gradient(180deg, #eef6fc 0%, #e4f0fb 45%, #e7f3ec 100%)", backgroundAttachment: "fixed" }}>
        <div style={{ textAlign: "center", maxWidth: 400 }}>
          <div style={{ width: 64, height: 64, borderRadius: "50%", background: "#2196f3", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16, fontFamily: "var(--display)", fontSize: 28, fontWeight: 800, color: "var(--ink)" }}>TD</div>
          <h1 className="td-display" style={{ fontSize: 28 }}>Configuration missing</h1>
          <p style={{ color: "var(--muted)", marginTop: 8, lineHeight: 1.5 }}>Copy <code style={{ background: "#e0f2fe", padding: "2px 4px", borderRadius: 3 }}>config.example.js</code> to <code style={{ background: "#e0f2fe", padding: "2px 4px", borderRadius: 3 }}>config.js</code> and add your Supabase credentials.</p>
        </div>
      </div>
    );
  }

  const r = route.replace('#', '') || '/';

  let page;
  if (r === '/admin/login' || (r.startsWith('/admin') && !adminApi.isAdmin)) page = <AdminLoginPage nav={nav}/>;
  else if (r.startsWith('/admin')) page = <AdminPage nav={nav} isDesktop={isDesktop}/>;
  else if (r === '/auth') page = <AuthPage nav={nav}/>;
  else if (r === '/dashboard') page = <DashboardPage nav={nav} isDesktop={isDesktop}/>;
  else if (r === '/bookings') page = <BookingsPage nav={nav} isDesktop={isDesktop}/>;
  else if (r === '/profile') page = <ProfilePage nav={nav} isDesktop={isDesktop}/>;
  else page = <LandingPage nav={nav} isDesktop={isDesktop}/>;

  return (
    <AppCtx.Provider value={ctx}>
      {page}
      {bookingSlot && <GuestBookingModal slot={bookingSlot} onClose={closeBooking}/>}
      {lookupOpen && <LookupBookingModal onClose={() => setLookupOpen(false)}/>}
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
